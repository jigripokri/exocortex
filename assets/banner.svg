<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Exocortex — an AI chief of staff that reads your stuff, remembers what matters, and runs your life in the background.">
  <title>Exocortex</title>
  <desc>An AI chief of staff that reads your stuff, remembers what matters, and runs your life in the background.</desc>

  <rect width="1280" height="400" fill="#0d1117"/>

  <g opacity="0.05" stroke="#fafafa" stroke-width="0.5">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
  </g>

  <text x="80" y="170" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="96" font-weight="600" fill="#fafafa" letter-spacing="-2">exocortex</text>

  <rect x="80" y="190" width="120" height="3" fill="#f59e0b"/>

  <text x="80" y="240" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="22" fill="#d1d5db">Your second brain, running while you sleep.</text>

  <text x="80" y="280" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="15" fill="#9ca3af">Seven markdown files. One mailto link trick. No database.</text>

  <text x="80" y="350" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="13" fill="#6b7280">github.com/jigripokri/exocortex</text>

  <g transform="translate(820, 100)">
    <rect x="0" y="0" width="380" height="56" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="24" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="11" fill="#6b7280" letter-spacing="1.5">LAYER 1 — BRIEFINGS</text>
    <text x="20" y="44" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#c9d1d9">Scheduled. Morning briefs land at 5am.</text>
  </g>

  <g transform="translate(820, 172)">
    <rect x="0" y="0" width="380" height="56" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="24" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="11" fill="#6b7280" letter-spacing="1.5">LAYER 2 — MEMORY</text>
    <text x="20" y="44" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#c9d1d9">people · commitments · insights · finances · health</text>
  </g>

  <g transform="translate(820, 244)">
    <rect x="0" y="0" width="380" height="56" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="24" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="11" fill="#6b7280" letter-spacing="1.5">LAYER 3 — SKILLS</text>
    <text x="20" y="44" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#c9d1d9">Drafts, replies, punch lists, on demand.</text>
  </g>
</svg>
